name: CI

# Required CI runs once per PR (pull_request) and on main pushes — never a duplicate
# feature-branch push run. Manual re-runs via workflow_dispatch. No path filtering: every PR
# gets the complete required gate.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Group by PR number (so new pushes to the same PR cancel superseded runs) while keeping main
# distinct. Valid GitHub Actions expression syntax.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # --- fast static signal: format, lint, types, schema, boundary --------------------------------
  backend-static:
    name: Backend static (format, lint, types, schema, boundary)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Format check (ruff)
        run: uv run ruff format --check apps contracts plugins scripts tests
      - name: Lint (ruff)
        run: uv run ruff check apps contracts plugins scripts tests
      - name: Type check (mypy)
        run: uv run mypy apps/api/secp_api apps/worker/secp_worker contracts plugins
      - name: Schema validation (web-breach-101)
        run: |
          uv run python - <<'PY'
          import yaml
          from secp_scenario_schema import validate_definition
          validate_definition(yaml.safe_load(open("docs/scenarios/web-breach-101.yaml")))
          print("web-breach-101 is valid against the schema")
          PY
      - name: Architecture boundary checks (fast duplicate signal)
        # Also covered by the sharded corpus; run here as an early architectural signal.
        run: uv run pytest tests/test_architecture_boundary.py -q

  # --- machine-enforced complete-coverage proof ------------------------------------------------
  backend-test-inventory:
    name: Backend test inventory (complete-coverage proof)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
      # Identical environment to the shard jobs so canonical vs. sharded collection match exactly.
      SECP_TEST_POSTGRES_URL: postgresql+psycopg://secp:secp@localhost:5432/secptest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secp
          POSTGRES_PASSWORD: secp
          POSTGRES_DB: secptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secp -d secptest"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Sharding planner/verifier unit tests
        run: uv run pytest tests/test_pytest_shards.py tests/test_ci_workflow.py -q
      - name: Prove sharded corpus == canonical corpus (node-level)
        run: uv run python scripts/ci/pytest_shards.py verify --collect

  # --- complete pytest corpus, balanced across parallel shards, real PostgreSQL per shard -------
  backend-pytest:
    name: Backend pytest shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      SECP_APP_ENV: test
      SECP_TEST_POSTGRES_URL: postgresql+psycopg://secp:secp@localhost:5432/secptest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secp
          POSTGRES_PASSWORD: secp
          POSTGRES_DB: secptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secp -d secptest"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Show shard assignment
        run: uv run python scripts/ci/pytest_shards.py plan
      - name: Run shard ${{ matrix.shard }} (real PostgreSQL, complete slice, no early exit)
        run: >-
          uv run python scripts/ci/pytest_shards.py run --shard ${{ matrix.shard }}
          -- -q -p no:cacheprovider --durations=15
          --junitxml=junit-shard-${{ matrix.shard }}.xml
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-shard-${{ matrix.shard }}
          path: junit-shard-${{ matrix.shard }}.xml
          if-no-files-found: warn

  # --- dependency/security scan ----------------------------------------------------------------
  backend-security:
    name: Backend security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Dependency/security scan (pip-audit)
        run: uv run pip-audit --skip-editable

  # --- production RealFilesystem backend, executed AS ROOT -------------------------------------
  # The hardened POSIX backend (openat / O_NOFOLLOW / root-owned-ancestor walk / transactional
  # makedir) REFUSES to operate unless every ancestor is root-owned, so the normal, non-root shards
  # SKIP `test_commissioning_realfs.py` entirely — and a fully-skipped module still exits 0. This
  # dedicated job runs that module under passwordless sudo (effective UID 0) so the production
  # implementation actually executes, then FAILS CLOSED by parsing the JUnit: it is green only if
  # the module truly ran (>= 8 collected, zero skipped / failed / errored). The pytest exit code
  # alone is NOT trusted, because an all-skipped run exits successfully.
  backend-realfs-root:
    name: Backend RealFilesystem (root, production openat backend)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Run production RealFilesystem tests as root
        # Absolute venv interpreter under passwordless sudo, so effective UID 0 satisfies the
        # backend's root-owned-ancestor requirement and the tests build a root-owned sandbox
        # beneath `/` (cleaned up by each test). No deployment infrastructure is contacted.
        run: >-
          sudo "$(pwd)/.venv/bin/python" -m pytest
          apps/commissioning/tests/test_commissioning_realfs.py
          -q -p no:cacheprovider
          --junitxml=junit-realfs-root.xml
      - name: Upload RealFilesystem JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-realfs-root
          path: junit-realfs-root.xml
          if-no-files-found: error
      - name: Enforce the production backend actually executed as root (no skips)
        if: always()
        # Parse the JUnit programmatically — do NOT trust pytest's exit code, since a fully-skipped
        # module exits 0. Fail unless >= 8 tests were collected and none were skipped/failed/errored.
        run: |
          "$(pwd)/.venv/bin/python" - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("junit-realfs-root.xml")
          if not p.exists():
              print("::error::junit-realfs-root.xml missing — the root test step produced no results")
              sys.exit(1)
          root = ET.parse(p).getroot()
          tests = failures = errors = skipped = 0
          for s in root.iter("testsuite"):
              tests += int(s.get("tests", 0))
              failures += int(s.get("failures", 0))
              errors += int(s.get("errors", 0))
              skipped += int(s.get("skipped", 0))
          print(f"collected={tests} failures={failures} errors={errors} skipped={skipped}")
          problems = []
          if tests < 8:
              problems.append(f"expected >= 8 RealFilesystem tests, collected {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped} (production backend NOT executed as root)")
          if failures != 0:
              problems.append(f"{failures} failing RealFilesystem test(s)")
          if errors != 0:
              problems.append(f"{errors} errored RealFilesystem test(s)")
          if problems:
              for pr in problems:
                  print(f"::error::{pr}")
              sys.exit(1)
          print("Production RealFilesystem backend executed as root: >= 8 tests, zero skipped/failed/errored.")
          PY

  # --- stable aggregate gate: green only if every backend job is green -------------------------
  # Retains the exact externally visible check name for branch-protection stability.
  backend:
    name: Backend (format, lint, types, tests, schema, boundary, security)
    runs-on: ubuntu-latest
    needs:
      [
        backend-static,
        backend-test-inventory,
        backend-pytest,
        backend-realfs-root,
        backend-security,
      ]
    if: always()
    steps:
      - name: Require every backend job to succeed
        run: |
          echo "backend-static         = ${{ needs.backend-static.result }}"
          echo "backend-test-inventory = ${{ needs.backend-test-inventory.result }}"
          echo "backend-pytest         = ${{ needs.backend-pytest.result }}"
          echo "backend-realfs-root    = ${{ needs.backend-realfs-root.result }}"
          echo "backend-security       = ${{ needs.backend-security.result }}"
          fail=0
          for r in \
            "${{ needs.backend-static.result }}" \
            "${{ needs.backend-test-inventory.result }}" \
            "${{ needs.backend-pytest.result }}" \
            "${{ needs.backend-realfs-root.result }}" \
            "${{ needs.backend-security.result }}"; do
            if [ "$r" != "success" ]; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more backend jobs did not succeed."
            exit 1
          fi
          echo "All backend jobs succeeded."

  frontend:
    name: Frontend (types, lint, build, tests, security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Tests
        run: npm run test
      - name: Dependency scan (production deps)
        # The Vite/esbuild dev toolchain carries known dev-server advisories that require a major
        # bump; the shipped surface (production deps) must be clean.
        run: npm audit --omit=dev --audit-level=high
