name: CI

# Required CI runs once per PR (pull_request) and on main pushes — never a duplicate
# feature-branch push run. Manual re-runs via workflow_dispatch. No path filtering: every PR
# gets the complete required gate.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Group by PR number (so new pushes to the same PR cancel superseded runs) while keeping main
# distinct. Valid GitHub Actions expression syntax.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # --- fast static signal: format, lint, types, schema, boundary --------------------------------
  backend-static:
    name: Backend static (format, lint, types, schema, boundary)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Format check (ruff)
        run: uv run ruff format --check apps contracts plugins scripts tests
      - name: Lint (ruff)
        run: uv run ruff check apps contracts plugins scripts tests
      - name: Type check (mypy)
        run: >-
          uv run mypy
          apps/api/secp_api
          apps/worker/secp_worker
          apps/commissioning/secp_commissioning
          apps/deployment/secp_operator_deployment
          apps/deployment/secp_discovery_activation
          apps/management/secp_management
          contracts
          plugins
      - name: Schema validation (web-breach-101)
        run: |
          uv run python - <<'PY'
          import yaml
          from secp_scenario_schema import validate_definition
          validate_definition(yaml.safe_load(open("docs/scenarios/web-breach-101.yaml")))
          print("web-breach-101 is valid against the schema")
          PY
      - name: Architecture boundary checks (fast duplicate signal)
        # Also covered by the sharded corpus; run here as an early architectural signal.
        run: >-
          uv run pytest
          tests/test_architecture_boundary.py
          tests/test_pr5f_discovery_activation_boundary.py
          -q

  # --- machine-enforced complete-coverage proof ------------------------------------------------
  backend-test-inventory:
    name: Backend test inventory (complete-coverage proof)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
      # Identical environment to the shard jobs so canonical vs. sharded collection match exactly.
      SECP_TEST_POSTGRES_URL: postgresql+psycopg://secp:secp@localhost:5432/secptest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secp
          POSTGRES_PASSWORD: secp
          POSTGRES_DB: secptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secp -d secptest"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Sharding planner/verifier unit tests
        run: uv run pytest tests/test_pytest_shards.py tests/test_ci_workflow.py -q
      - name: Prove sharded corpus == canonical corpus (node-level)
        run: uv run python scripts/ci/pytest_shards.py verify --collect

  # --- complete pytest corpus, balanced across parallel shards, real PostgreSQL per shard -------
  backend-pytest:
    name: Backend pytest shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      SECP_APP_ENV: test
      SECP_TEST_POSTGRES_URL: postgresql+psycopg://secp:secp@localhost:5432/secptest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secp
          POSTGRES_PASSWORD: secp
          POSTGRES_DB: secptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secp -d secptest"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Show shard assignment
        run: uv run python scripts/ci/pytest_shards.py plan
      - name: Run shard ${{ matrix.shard }} (real PostgreSQL, complete slice, no early exit)
        run: >-
          uv run python scripts/ci/pytest_shards.py run --shard ${{ matrix.shard }}
          -- -q -p no:cacheprovider --durations=15
          --junitxml=junit-shard-${{ matrix.shard }}.xml
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-shard-${{ matrix.shard }}
          path: junit-shard-${{ matrix.shard }}.xml
          if-no-files-found: warn

  # --- PR5F PostgreSQL finalization fence, dedicated no-skip transaction proof ----------------
  # The normal shards include this module, but this additive gate proves the real PostgreSQL named
  # constraint and release/rollback transaction semantics cannot disappear behind a skip. It runs
  # only against the ephemeral job-local database and contacts no deployment infrastructure.
  backend-pr5f-postgres-finalization:
    name: PR5F PostgreSQL finalization fence (real DB, no skips)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
      SECP_TEST_POSTGRES_URL: postgresql+psycopg://secp:secp@localhost:5432/secptest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secp
          POSTGRES_PASSWORD: secp
          POSTGRES_DB: secptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secp -d secptest"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Run the real PostgreSQL PR5F fence transaction proof
        run: >-
          uv run pytest
          apps/api/tests/test_discovery_activation_rollback_migration_postgres.py
          -q -p no:cacheprovider
          --junitxml=junit-pr5f-postgres-finalization.xml
      - name: Upload PR5F PostgreSQL JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-pr5f-postgres-finalization
          path: junit-pr5f-postgres-finalization.xml
          if-no-files-found: error
      - name: Enforce the PostgreSQL finalization proof actually executed (no skips)
        if: always()
        run: |
          "$(pwd)/.venv/bin/python" - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          path = Path("junit-pr5f-postgres-finalization.xml")
          if not path.exists():
              print("::error::PR5F PostgreSQL JUnit missing — the test step produced no results")
              sys.exit(1)
          root = ET.parse(path).getroot()
          tests = failures = errors = skipped = 0
          for suite in root.iter("testsuite"):
              tests += int(suite.get("tests", 0))
              failures += int(suite.get("failures", 0))
              errors += int(suite.get("errors", 0))
              skipped += int(suite.get("skipped", 0))
          print(f"collected={tests} failures={failures} errors={errors} skipped={skipped}")
          problems = []
          if tests < 1:
              problems.append(f"expected >= 1 PR5F PostgreSQL test, collected {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped} (real fence proof did not run)")
          if failures != 0:
              problems.append(f"{failures} failing PR5F PostgreSQL test(s)")
          if errors != 0:
              problems.append(f"{errors} errored PR5F PostgreSQL test(s)")
          if problems:
              for problem in problems:
                  print(f"::error::{problem}")
              sys.exit(1)
          print("PR5F PostgreSQL fence proof executed: >= 1 test, zero skipped/failed/errored.")
          PY

  # --- dependency/security scan ----------------------------------------------------------------
  backend-security:
    name: Backend security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Dependency/security scan (pip-audit)
        run: uv run pip-audit --skip-editable

  # --- production RealFilesystem backend, executed AS ROOT -------------------------------------
  # The hardened POSIX backend (openat / O_NOFOLLOW / root-owned-ancestor walk / transactional
  # makedir) REFUSES to operate unless every ancestor is root-owned, so the normal, non-root shards
  # SKIP `test_commissioning_realfs.py` entirely — and a fully-skipped module still exits 0. This
  # dedicated job runs that module under passwordless sudo (effective UID 0) so the production
  # implementation actually executes, then FAILS CLOSED by parsing the JUnit: it is green only if
  # the module truly ran (>= 8 collected, zero skipped / failed / errored). The pytest exit code
  # alone is NOT trusted, because an all-skipped run exits successfully.
  backend-realfs-root:
    name: Backend RealFilesystem (root, production openat backend)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Run production RealFilesystem tests as root
        # Absolute venv interpreter under passwordless sudo, so effective UID 0 satisfies the
        # backend's root-owned-ancestor requirement and the tests build a root-owned sandbox
        # beneath `/` (cleaned up by each test). No deployment infrastructure is contacted.
        run: >-
          sudo "$(pwd)/.venv/bin/python" -m pytest
          apps/commissioning/tests/test_commissioning_realfs.py
          -q -p no:cacheprovider
          --junitxml=junit-realfs-root.xml
      - name: Upload RealFilesystem JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-realfs-root
          path: junit-realfs-root.xml
          if-no-files-found: error
      - name: Enforce the production backend actually executed as root (no skips)
        if: always()
        # Parse the JUnit programmatically — do NOT trust pytest's exit code, since a fully-skipped
        # module exits 0. Fail unless >= 8 tests were collected and none were skipped/failed/errored.
        run: |
          "$(pwd)/.venv/bin/python" - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("junit-realfs-root.xml")
          if not p.exists():
              print("::error::junit-realfs-root.xml missing — the root test step produced no results")
              sys.exit(1)
          root = ET.parse(p).getroot()
          tests = failures = errors = skipped = 0
          for s in root.iter("testsuite"):
              tests += int(s.get("tests", 0))
              failures += int(s.get("failures", 0))
              errors += int(s.get("errors", 0))
              skipped += int(s.get("skipped", 0))
          print(f"collected={tests} failures={failures} errors={errors} skipped={skipped}")
          problems = []
          if tests < 8:
              problems.append(f"expected >= 8 RealFilesystem tests, collected {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped} (production backend NOT executed as root)")
          if failures != 0:
              problems.append(f"{failures} failing RealFilesystem test(s)")
          if errors != 0:
              problems.append(f"{errors} errored RealFilesystem test(s)")
          if problems:
              for pr in problems:
                  print(f"::error::{pr}")
              sys.exit(1)
          print("Production RealFilesystem backend executed as root: >= 8 tests, zero skipped/failed/errored.")
          PY

  # --- PR5F fixed-layout worker-state transaction, executed AS ROOT ----------------------------
  # The production backend is intentionally pinned to /var/lib/secp/discovery-worker and cannot be
  # redirected to a temp path. The normal shards collect this module but skip it. This dedicated,
  # ephemeral Linux job verifies the trusted parent + absent leaf, opts in explicitly, executes as
  # effective UID 0, and FAILS CLOSED on any skip/under-collection/failure. It creates no container,
  # starts no service, contacts no endpoint, and never runs an operator or OpenTofu.
  backend-discovery-activation-root:
    name: PR5F discovery activation root-security (fixed state transaction)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Prepare the fixed trusted production parent
        # The ephemeral runner starts without SECP state. Create only the code-owned parent; the
        # test owns the leaf transaction and refuses if that leaf or either test sibling exists. An
        # existing parent is NEVER chmod'd/chown'd/repaired before the trust preflight.
        run: |
          sudo "$(pwd)/.venv/bin/python" - <<'PY'
          import os, stat, sys
          from pathlib import Path
          problems = []
          for component in (Path("/"), Path("/var"), Path("/var/lib")):
              try:
                  observed = component.lstat()
              except OSError as exc:
                  problems.append(f"{component}: not statable (errno {exc.errno})")
                  continue
              mode = observed.st_mode
              if stat.S_ISLNK(mode) or not stat.S_ISDIR(mode):
                  problems.append(f"{component}: not a real directory")
              if observed.st_uid != 0 or observed.st_gid != 0:
                  problems.append(f"{component}: not root:root")
              if stat.S_IMODE(mode) & 0o022:
                  problems.append(f"{component}: group/other-writable")
          if problems:
              for problem in problems:
                  print(f"::error::{problem}")
              sys.exit(1)
          parent = Path("/var/lib/secp")
          if os.path.lexists(parent):
              print(f"fixed parent already exists and was left untouched: {parent}")
          else:
              os.mkdir(parent, 0o755)
              os.chown(parent, 0, 0, follow_symlinks=False)
              os.chmod(parent, 0o755, follow_symlinks=False)
              print(f"created fixed ephemeral root-test parent: {parent}")
          PY
      - name: Fail-closed fixed-layout trust and absence preflight
        run: |
          sudo "$(pwd)/.venv/bin/python" - <<'PY'
          import os, stat, sys
          from pathlib import Path
          parent = Path("/var/lib/secp")
          chain = (Path("/"), Path("/var"), Path("/var/lib"), parent)
          problems = []
          for component in chain:
              try:
                  observed = component.lstat()
              except OSError as exc:
                  problems.append(f"{component}: not statable (errno {exc.errno})")
                  continue
              mode = observed.st_mode
              if stat.S_ISLNK(mode):
                  problems.append(f"{component}: is a symlink")
              elif not stat.S_ISDIR(mode):
                  problems.append(f"{component}: is not a real directory")
              if observed.st_uid != 0 or observed.st_gid != 0:
                  problems.append(
                      f"{component}: owner={observed.st_uid}:{observed.st_gid} (not root:root)"
                  )
              if stat.S_IMODE(mode) & 0o020:
                  problems.append(f"{component}: group-writable")
              if stat.S_IMODE(mode) & 0o002:
                  problems.append(f"{component}: other-writable")
          test_paths = (
              parent / "discovery-worker",
              parent / "pr5f-discovery-root-test-target",
              parent / "pr5f-discovery-root-test-original",
          )
          for path in test_paths:
              if os.path.lexists(path):
                  problems.append(f"{path}: pre-existing path refuses the root gate")
          if problems:
              for problem in problems:
                  print(f"::error::{problem}")
              sys.exit(1)
          print(f"trusted fixed parent and absent test paths proven: {parent}")
          PY
      - name: Prepare the fixed trusted controller-config parent (PR5F.1 env file)
        # The controller Compose environment file lives at the code-owned /etc/secp/controller/
        # secp.env.  Create only the code-owned parents (root:root 0755); the test owns the leaf
        # files and refuses if any pre-exist.  An existing parent is never chmod'd/chown'd/repaired.
        run: |
          sudo "$(pwd)/.venv/bin/python" - <<'PY'
          import os, stat, sys
          from pathlib import Path
          problems = []
          for component in (Path("/"), Path("/etc")):
              observed = component.lstat()
              mode = observed.st_mode
              if stat.S_ISLNK(mode) or not stat.S_ISDIR(mode):
                  problems.append(f"{component}: not a real directory")
              if observed.st_uid != 0 or observed.st_gid != 0:
                  problems.append(f"{component}: not root:root")
              if stat.S_IMODE(mode) & 0o022:
                  problems.append(f"{component}: group/other-writable")
          if problems:
              for problem in problems:
                  print(f"::error::{problem}")
              sys.exit(1)
          for directory in (Path("/etc/secp"), Path("/etc/secp/controller")):
              if os.path.lexists(directory):
                  print(f"fixed controller-config parent already exists, left untouched: {directory}")
              else:
                  os.mkdir(directory, 0o755)
                  os.chown(directory, 0, 0, follow_symlinks=False)
                  os.chmod(directory, 0o755, follow_symlinks=False)
                  print(f"created fixed ephemeral controller-config parent: {directory}")
          PY
      - name: Run PR5F fixed-layout root transaction tests (no skips)
        run: >-
          sudo env
          "SECP_DISCOVERY_ACTIVATION_ROOT_TEST=fixed-layout-ci-only"
          "$(pwd)/.venv/bin/python" -m pytest
          tests/test_pr5f_discovery_activation_root.py
          tests/test_pr5f_controller_env_root.py
          -q -p no:cacheprovider
          --junitxml=junit-discovery-activation-root.xml
      - name: Upload PR5F root-transaction JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-discovery-activation-root
          path: junit-discovery-activation-root.xml
          if-no-files-found: error
      - name: Enforce PR5F root transaction actually executed (no skips)
        if: always()
        run: |
          "$(pwd)/.venv/bin/python" - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          path = Path("junit-discovery-activation-root.xml")
          if not path.exists():
              print("::error::PR5F root JUnit missing — the root test step produced no results")
              sys.exit(1)
          root = ET.parse(path).getroot()
          tests = failures = errors = skipped = 0
          for suite in root.iter("testsuite"):
              tests += int(suite.get("tests", 0))
              failures += int(suite.get("failures", 0))
              errors += int(suite.get("errors", 0))
              skipped += int(suite.get("skipped", 0))
          print(f"collected={tests} failures={failures} errors={errors} skipped={skipped}")
          problems = []
          if tests < 20:
              problems.append(f"expected >= 20 PR5F root tests, collected {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped} (root transaction did not run)")
          if failures != 0:
              problems.append(f"{failures} failing PR5F root test(s)")
          if errors != 0:
              problems.append(f"{errors} errored PR5F root test(s)")
          if problems:
              for problem in problems:
                  print(f"::error::{problem}")
              sys.exit(1)
          print("PR5F fixed-layout transaction executed: >= 9 tests, zero skipped/failed/errored.")
          PY

  # --- deployment package root-security tests, executed AS ROOT --------------------------------
  # The deployment package's trusted directory-fd manifest walk (open every ancestor from `/` with
  # O_DIRECTORY|O_NOFOLLOW|O_CLOEXEC and require each is a real dir, root-owned, non-world-writable),
  # the executable-object pinning root-owner refusal, and the real pinned-exec subprocess seam only
  # EXECUTE meaningfully as effective UID 0 — so the normal, non-root shards SKIP the root-only
  # trust/ownership tests (a fully-skipped test still exits 0). This dedicated job runs the deployment
  # root-security modules under passwordless sudo so the production trust checks actually run, then
  # FAILS CLOSED by parsing the JUnit: green only if they truly ran (>= 20 collected, zero
  # skipped/failed/errored). The pytest exit code alone is NOT trusted (an all-skipped run exits 0).
  # No deployment infrastructure is contacted; every child process is a local, bounded, pinned probe.
  backend-deployment-root:
    name: Deployment package root-security (root, trusted dir-fd + pinned exec)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Prepare a genuinely root-only trusted base directory
        # Build the root test trees under /root/secp-roottest, whose ancestors (/ and /root) are
        # root-owned and NON-group/other-writable on a hosted runner — unlike /opt, an ancestor of
        # which is group/other-writable and is (correctly) rejected by the production trust walk.
        # Only the dedicated child dir is created + chmod'd (0700); no broad system dir is mutated.
        run: |
          sudo mkdir -p /root/secp-roottest
          sudo chown root:root /root/secp-roottest
          sudo chmod 700 /root/secp-roottest
      - name: Fail-closed ancestor-chain trust preflight
        # Programmatically require every component of SECP_ROOT_TEST_DIR (/, /root,
        # /root/secp-roottest) to be a REAL directory, root-owned (uid 0), NOT a symlink, and with NO
        # group-write and NO other-write bit — and EXIT NONZERO if any fails (never print-and-continue).
        # Runs under sudo so it can lstat the child beneath the 0700 /root. This guards the fixture the
        # same way the production dir-fd walk guards the installed package.
        run: |
          sudo env "SECP_ROOT_TEST_DIR=/root/secp-roottest" "$(pwd)/.venv/bin/python" - <<'PY'
          import os, stat, sys
          base = os.environ["SECP_ROOT_TEST_DIR"]
          if not os.path.isabs(base):
              print("::error::SECP_ROOT_TEST_DIR must be an absolute path")
              sys.exit(1)
          parts = [p for p in base.split("/") if p]
          chain = ["/"] + ["/" + "/".join(parts[: i + 1]) for i in range(len(parts))]
          problems = []
          for comp in chain:
              try:
                  st = os.lstat(comp)  # lstat: a symlink component is caught, not followed
              except OSError as exc:
                  problems.append(f"{comp}: not statable (errno {exc.errno})")
                  continue
              mode = st.st_mode
              if stat.S_ISLNK(mode):
                  problems.append(f"{comp}: is a symlink")
                  continue
              if not stat.S_ISDIR(mode):
                  problems.append(f"{comp}: not a real directory")
                  continue
              if st.st_uid != 0:
                  problems.append(f"{comp}: uid={st.st_uid} (not root-owned)")
              perm = stat.S_IMODE(mode)
              if perm & 0o020:
                  problems.append(f"{comp}: group-writable (mode {oct(perm)})")
              if perm & 0o002:
                  problems.append(f"{comp}: other-writable (mode {oct(perm)})")
          if problems:
              for pr in problems:
                  print(f"::error::untrusted ancestor {pr}")
              sys.exit(1)
          print(f"ancestor chain trusted (real dir, uid 0, no group/other write): {chain}")
          PY
      - name: Run deployment root-security tests as root (no skips)
        # Absolute venv interpreter under passwordless sudo (effective UID 0) so the trusted dir-fd
        # walk, the pinned-exec root-owner refusal, and the real subprocess seam actually execute. The
        # fixtures build beneath the preflight-verified SECP_ROOT_TEST_DIR (same fixed trusted dir).
        run: >-
          sudo env "SECP_ROOT_TEST_DIR=/root/secp-roottest" "$(pwd)/.venv/bin/python" -m pytest
          apps/deployment/tests/test_deployment_root_manifest.py
          apps/deployment/tests/test_deployment_pinned_exec.py
          apps/deployment/tests/test_deployment_realproc.py
          -q -p no:cacheprovider
          --junitxml=junit-deployment-root.xml
      - name: Upload deployment root JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-deployment-root
          path: junit-deployment-root.xml
          if-no-files-found: error
      - name: Enforce the deployment root-security tests actually executed as root (no skips)
        if: always()
        # Parse the JUnit programmatically — do NOT trust pytest's exit code, since a fully-skipped
        # module exits 0. Fail unless >= 20 collected and none skipped/failed/errored.
        run: |
          "$(pwd)/.venv/bin/python" - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("junit-deployment-root.xml")
          if not p.exists():
              print("::error::junit-deployment-root.xml missing — the root test step produced no results")
              sys.exit(1)
          root = ET.parse(p).getroot()
          tests = failures = errors = skipped = 0
          for s in root.iter("testsuite"):
              tests += int(s.get("tests", 0))
              failures += int(s.get("failures", 0))
              errors += int(s.get("errors", 0))
              skipped += int(s.get("skipped", 0))
          print(f"collected={tests} failures={failures} errors={errors} skipped={skipped}")
          problems = []
          if tests < 20:
              problems.append(f"expected >= 20 deployment root tests, collected {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped} (root-security tests NOT executed as root)")
          if failures != 0:
              problems.append(f"{failures} failing deployment root test(s)")
          if errors != 0:
              problems.append(f"{errors} errored deployment root test(s)")
          if problems:
              for pr in problems:
                  print(f"::error::{pr}")
              sys.exit(1)
          print("Deployment root-security tests executed as root: >= 20 tests, zero skipped/failed/errored.")
          PY

  # --- management-plane bootstrap root-security tests, executed AS ROOT -------------------------
  # The management bootstrap writes root-controlled evidence/identity through the hardened
  # RealFilesystem (trusted-ancestor walk, atomic install, ownership/mode). Those writes only execute
  # meaningfully as effective UID 0, so the non-root shards SKIP the management root tests. This
  # dedicated job runs them under passwordless sudo (with the same fail-closed ancestor-chain
  # preflight as the deployment root job), then FAILS CLOSED by parsing the JUnit: green only if they
  # truly ran (>= 3 collected, zero skipped/failed/errored). No infrastructure is contacted; nothing
  # is deployed, activated, or started.
  backend-management-root:
    name: Management-plane bootstrap root-security (root, hardened install)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Prepare a genuinely root-only trusted base directory
        run: |
          sudo mkdir -p /root/secp-mgmt-roottest
          sudo chown root:root /root/secp-mgmt-roottest
          sudo chmod 700 /root/secp-mgmt-roottest
      - name: Fail-closed ancestor-chain trust preflight
        # Every component of SECP_ROOT_TEST_DIR must be a real dir, root-owned, non-symlink, with no
        # group/other write — exit nonzero on any failure (never print-and-continue).
        run: |
          sudo env "SECP_ROOT_TEST_DIR=/root/secp-mgmt-roottest" "$(pwd)/.venv/bin/python" - <<'PY'
          import os, stat, sys
          base = os.environ["SECP_ROOT_TEST_DIR"]
          if not os.path.isabs(base):
              print("::error::SECP_ROOT_TEST_DIR must be an absolute path")
              sys.exit(1)
          parts = [p for p in base.split("/") if p]
          chain = ["/"] + ["/" + "/".join(parts[: i + 1]) for i in range(len(parts))]
          problems = []
          for comp in chain:
              try:
                  st = os.lstat(comp)
              except OSError as exc:
                  problems.append(f"{comp}: not statable (errno {exc.errno})")
                  continue
              mode = st.st_mode
              if stat.S_ISLNK(mode):
                  problems.append(f"{comp}: is a symlink")
                  continue
              if not stat.S_ISDIR(mode):
                  problems.append(f"{comp}: not a real directory")
                  continue
              if st.st_uid != 0:
                  problems.append(f"{comp}: uid={st.st_uid} (not root-owned)")
              perm = stat.S_IMODE(mode)
              if perm & 0o020:
                  problems.append(f"{comp}: group-writable (mode {oct(perm)})")
              if perm & 0o002:
                  problems.append(f"{comp}: other-writable (mode {oct(perm)})")
          if problems:
              for pr in problems:
                  print(f"::error::untrusted ancestor {pr}")
              sys.exit(1)
          print(f"ancestor chain trusted: {chain}")
          PY
      - name: Run management-plane root-security tests as root (no skips)
        run: >-
          sudo env "SECP_ROOT_TEST_DIR=/root/secp-mgmt-roottest" "$(pwd)/.venv/bin/python" -m pytest
          apps/management/tests/test_management_root.py
          -q -p no:cacheprovider
          --junitxml=junit-management-root.xml
      - name: Upload management root JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-management-root
          path: junit-management-root.xml
          if-no-files-found: error
      - name: Enforce the management root-security tests actually executed as root (no skips)
        if: always()
        run: |
          "$(pwd)/.venv/bin/python" - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("junit-management-root.xml")
          if not p.exists():
              print("::error::junit-management-root.xml missing — the root test step produced no results")
              sys.exit(1)
          root = ET.parse(p).getroot()
          tests = failures = errors = skipped = 0
          for s in root.iter("testsuite"):
              tests += int(s.get("tests", 0))
              failures += int(s.get("failures", 0))
              errors += int(s.get("errors", 0))
              skipped += int(s.get("skipped", 0))
          print(f"collected={tests} failures={failures} errors={errors} skipped={skipped}")
          problems = []
          if tests < 3:
              problems.append(f"expected >= 3 management root tests, collected {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped} (root-security tests NOT executed as root)")
          if failures != 0:
              problems.append(f"{failures} failing management root test(s)")
          if errors != 0:
              problems.append(f"{errors} errored management root test(s)")
          if problems:
              for pr in problems:
                  print(f"::error::{pr}")
              sys.exit(1)
          print("Management root-security tests executed as root: >= 3 tests, zero skipped/failed/errored.")
          PY

  # --- Real management adapters executed against REAL Docker + systemd, AS ROOT ----------------
  # The hermetic management tests exercise the real leaves through recording runners; this job runs
  # the ACTUAL RealWorkerBootstrapAdapter / RealManagementHostObserver / RealManagementRollbackAdapter
  # through the pinned RealCommandRunner + hardened RealFilesystem against disposable real containers
  # and a real DISABLED+STOPPED operator unit: image load + loaded-digest verification (right loads /
  # wrong refuses), operator present+disabled+stopped, ordinary observed running+healthy with an
  # opaque marker, status reobservation, partial-bootstrap compensation with zero residual, exact
  # rollback, idempotent retry. FAILS CLOSED by parsing the JUnit (a fully-skipped or non-executing
  # run can never pass). It enables/starts no operator, submits no workflow, and contacts no provider
  # or OpenTofu. (The full 8-service controller stack + real migration are the follow-on 4b job.)
  backend-management-real-adapters-root:
    name: Management real adapters E2E (root, real Docker + systemd)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Verify real Docker daemon + systemd + pinned binaries are present
        # The runner ships a live Docker daemon and systemd as PID 1; the adapters pin the real
        # root-owned docker/systemctl binaries. Pre-pull the disposable images so the timed adapter
        # steps never race a registry pull. Fail fast if any prerequisite is missing.
        run: |
          docker version
          systemctl --version | head -1
          test -f /usr/bin/docker && test -f /usr/bin/systemctl
          docker pull hello-world:latest
          docker pull busybox:latest
      - name: Prepare a genuinely root-only trusted base directory
        # The hardened filesystem refuses to write unless EVERY ancestor is root-owned and not
        # group/other-writable; /opt on the runner has a world-writable ancestor, so the sandbox
        # layout roots live under a fresh root:root tree beneath /root (whose chain is trusted).
        run: |
          sudo mkdir -p /root/secp-mgmt-real
          sudo chown root:root /root/secp-mgmt-real
          sudo chmod 0755 /root/secp-mgmt-real
      - name: Run the real management adapter E2E as root (no skips)
        # Absolute venv interpreter under passwordless sudo (effective UID 0) so the pinned runner's
        # root-owned executable + hardened root-owned filesystem requirements are satisfied and the
        # operator unit is installed into the real /etc/systemd/system. SECP_ROOT_TEST_DIR is a
        # root-owned, non-group/other-writable ancestor for the sandbox layout roots.
        run: >-
          sudo env "SECP_ROOT_TEST_DIR=/root/secp-mgmt-real" "$(pwd)/.venv/bin/python" -m pytest
          apps/management/tests/test_management_real_adapters_root.py
          -q -p no:cacheprovider
          --junitxml=junit-management-real-adapters-root.xml
      - name: Upload management real-adapter JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-management-real-adapters-root
          path: junit-management-real-adapters-root.xml
          if-no-files-found: error
      - name: Enforce the real adapters actually executed against real infra (no skips)
        if: always()
        # Parse the JUnit programmatically — do NOT trust pytest's exit code, since a fully-skipped
        # module exits 0. Green only if >= 5 tests ran and none were skipped/failed/errored.
        run: |
          "$(pwd)/.venv/bin/python" - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("junit-management-real-adapters-root.xml")
          if not p.exists():
              print("::error::junit-management-real-adapters-root.xml missing — no results produced")
              sys.exit(1)
          root = ET.parse(p).getroot()
          tests = failures = errors = skipped = 0
          for s in root.iter("testsuite"):
              tests += int(s.get("tests", 0))
              failures += int(s.get("failures", 0))
              errors += int(s.get("errors", 0))
              skipped += int(s.get("skipped", 0))
          print(f"collected={tests} failures={failures} errors={errors} skipped={skipped}")
          problems = []
          if tests < 5:
              problems.append(f"expected >= 5 real-adapter E2E tests, collected {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped} (real adapters NOT executed against real infra)")
          if failures != 0:
              problems.append(f"{failures} failing real-adapter E2E test(s)")
          if errors != 0:
              problems.append(f"{errors} errored real-adapter E2E test(s)")
          if problems:
              for pr in problems:
                  print(f"::error::{pr}")
              sys.exit(1)
          print("Real management adapters executed against real Docker + systemd: >= 5 tests, zero skipped/failed/errored.")
          PY

  # --- stable aggregate gate: green only if every backend job is green -------------------------
  # Retains the exact externally visible check name for branch-protection stability.
  # --- Real production Python image smoke (build + locked-down container) ----------------------
  # Builds the exact repository production image and proves the installed image (not the host
  # checkout) contains the full pyproject package closure, resolves the real console-script files,
  # runs as the reviewed 10001:10001 user, pins the sole Alembic head, and produces a deterministic
  # self-validating runtime overlay. The smoke container has no network, a read-only rootfs, a
  # bounded /tmp tmpfs, all capabilities dropped, no-new-privileges, no Docker socket, no host
  # secrets/env files, and no bind mount (the check script is fed over stdin). FAILS CLOSED by
  # parsing the JUnit, so a fully-skipped or non-executing smoke can never pass.
  backend-python-image-smoke:
    name: Python production image smoke (build + locked-down container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the production Python image (repository root build context)
        run: docker build -f infra/dev/Dockerfile.python -t secp-python-image-smoke:ci .
      - name: Run the image smoke in a locked-down container (no network, read-only, cap-drop)
        run: |
          set -uo pipefail
          # Capture the container exit non-fatally: the JUnit gate below is the sole authority (a
          # smoke failure is reported per-check there), matching the "do not trust the exit code,
          # parse the JUnit" pattern used by the other no-skip jobs.
          status=0
          docker run --rm -i \
            --network none \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=16m \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            secp-python-image-smoke:ci \
            python - < infra/dev/image_smoke.py > junit-python-image-smoke.xml || status=$?
          echo "smoke container exit: $status"
      - name: Upload image-smoke JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend-python-image-smoke
          path: junit-python-image-smoke.xml
          if-no-files-found: error
      - name: Enforce the image smoke executed every check (no skips, no failures)
        if: always()
        # Parse the JUnit — do NOT trust the container exit code. Green only if all checks ran and
        # none were skipped or failed, proving the real built image passed every case.
        run: |
          python3 - <<'PY'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("junit-python-image-smoke.xml")
          if not p.exists() or p.stat().st_size == 0:
              print("::error::junit-python-image-smoke.xml missing/empty — the smoke produced no result")
              sys.exit(1)
          root = ET.parse(p).getroot()
          tests = failures = skipped = 0
          for s in root.iter("testsuite"):
              tests += int(s.get("tests", 0))
              failures += int(s.get("failures", 0))
              skipped += int(s.get("skipped", 0))
          print(f"image-smoke checks={tests} failures={failures} skipped={skipped}")
          problems = []
          if tests < 5:
              problems.append(f"expected >= 5 image-smoke checks, got {tests}")
          if skipped != 0:
              problems.append(f"expected 0 skipped, got {skipped}")
          if failures != 0:
              problems.append(f"{failures} image-smoke check(s) failed")
          if problems:
              for pr in problems:
                  print(f"::error::{pr}")
              sys.exit(1)
          print("Image smoke green: full closure, scripts, 10001:10001, sole head, deterministic overlay.")
          PY

  backend:
    name: Backend (format, lint, types, tests, schema, boundary, security)
    runs-on: ubuntu-latest
    needs:
      [
        backend-static,
        backend-test-inventory,
        backend-pytest,
        backend-pr5f-postgres-finalization,
        backend-realfs-root,
        backend-discovery-activation-root,
        backend-deployment-root,
        backend-management-root,
        backend-management-real-adapters-root,
        backend-security,
        backend-python-image-smoke,
      ]
    if: always()
    steps:
      - name: Require every backend job to succeed
        run: |
          echo "backend-static          = ${{ needs.backend-static.result }}"
          echo "backend-test-inventory  = ${{ needs.backend-test-inventory.result }}"
          echo "backend-pytest          = ${{ needs.backend-pytest.result }}"
          echo "backend-pr5f-postgres   = ${{ needs.backend-pr5f-postgres-finalization.result }}"
          echo "backend-realfs-root     = ${{ needs.backend-realfs-root.result }}"
          echo "backend-pr5f-root       = ${{ needs.backend-discovery-activation-root.result }}"
          echo "backend-deployment-root = ${{ needs.backend-deployment-root.result }}"
          echo "backend-management-root = ${{ needs.backend-management-root.result }}"
          echo "backend-mgmt-real-adpt  = ${{ needs.backend-management-real-adapters-root.result }}"
          echo "backend-security        = ${{ needs.backend-security.result }}"
          echo "backend-image-smoke     = ${{ needs.backend-python-image-smoke.result }}"
          fail=0
          for r in \
            "${{ needs.backend-static.result }}" \
            "${{ needs.backend-test-inventory.result }}" \
            "${{ needs.backend-pytest.result }}" \
            "${{ needs.backend-pr5f-postgres-finalization.result }}" \
            "${{ needs.backend-realfs-root.result }}" \
            "${{ needs.backend-discovery-activation-root.result }}" \
            "${{ needs.backend-deployment-root.result }}" \
            "${{ needs.backend-management-root.result }}" \
            "${{ needs.backend-management-real-adapters-root.result }}" \
            "${{ needs.backend-security.result }}" \
            "${{ needs.backend-python-image-smoke.result }}"; do
            if [ "$r" != "success" ]; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more backend jobs did not succeed."
            exit 1
          fi
          echo "All backend jobs succeeded."

  frontend:
    name: Frontend (types, lint, build, tests, security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Tests
        run: npm run test
      - name: Dependency scan (production deps)
        # The Vite/esbuild dev toolchain carries known dev-server advisories that require a major
        # bump; the shipped surface (production deps) must be clean.
        run: npm audit --omit=dev --audit-level=high
