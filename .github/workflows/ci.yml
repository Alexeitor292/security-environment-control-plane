name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (format, lint, types, tests, schema, boundary, security)
    runs-on: ubuntu-latest
    env:
      SECP_APP_ENV: test
      # Enables the DB-level immutability tests against the service container.
      SECP_TEST_POSTGRES_URL: postgresql+psycopg://secp:secp@localhost:5432/secptest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secp
          POSTGRES_PASSWORD: secp
          POSTGRES_DB: secptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secp -d secptest"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Create venv and install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Format check (ruff)
        run: uv run ruff format --check apps contracts plugins tests

      - name: Lint (ruff)
        run: uv run ruff check apps contracts plugins tests

      - name: Type check (mypy)
        run: uv run mypy apps/api/secp_api apps/worker/secp_worker contracts plugins

      - name: Schema validation (web-breach-101)
        run: |
          uv run python - <<'PY'
          import yaml
          from secp_scenario_schema import validate_definition
          validate_definition(yaml.safe_load(open("docs/scenarios/web-breach-101.yaml")))
          print("web-breach-101 is valid against the schema")
          PY

      - name: Architecture boundary checks
        run: uv run pytest tests/test_architecture_boundary.py -q

      - name: Tests (pytest, incl. PostgreSQL immutability)
        run: uv run pytest apps/api/tests tests -q

      - name: Dependency/security scan (pip-audit)
        run: uv run pip-audit --skip-editable

  frontend:
    name: Frontend (types, lint, build, tests, security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Tests
        run: npm run test

      - name: Dependency scan (production deps)
        # The Vite/esbuild dev toolchain carries known dev-server advisories that
        # require a major bump; the shipped surface (production deps) must be clean.
        run: npm audit --omit=dev --audit-level=high
