# Alembic configuration for the control-plane database.
# The database URL is resolved at runtime from application settings (see
# migrations/env.py); the value here is only a non-secret placeholder.
[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlite+pysqlite:///./secp_dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
